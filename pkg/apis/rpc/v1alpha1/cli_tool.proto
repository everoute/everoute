syntax = "proto3";
package everoute_io.pkg.apis.rpc.v1alpha1;;
option go_package = "pkg/apis/rpc/v1alpha1";


import "google/protobuf/empty.proto";

message PolicyRule{
  string RuleID = 1;
  int32  Priority = 2;
  string SrcIPAddr = 3;
  string DstIPAddr = 4;
  uint32 IPProtocol = 5;
  uint32 SrcPort = 6;
  uint32 SrcPortMask = 7;
  uint32 DstPort = 8;
  uint32 DstPortMask = 9;
  string Action = 10;
}

message FlowEntry{
  uint32 Priority = 1;
  uint64 FlowID = 2;
}

message PolicyRuleReference{
  string NameSpace = 1;
  string Name = 2;
  string Type = 3;
}

message RuleEntry{
  PolicyRule EveroutePolicyRule = 1;
  uint32 Direction = 2;
  uint32 Tier = 3;
  string Mode = 4;
  map<string, FlowEntry> RuleFlowMap = 5;
  repeated PolicyRuleReference PolicyRuleReference = 6;
}

message RuleEntries{
  repeated RuleEntry RuleEntries = 1;
}

message RuleIDs{
  repeated string RuleIDs = 1;
}

message FlowIDs{
  repeated uint64 FlowIDs = 1;
}

message SvcID {
  string ID = 1;
}

message SvcPort {
  string Name = 1;
  int32 Port = 2;
  string Protocol = 3;
}

message Backend {
  string IP = 1;
  string Protocol = 2;
  int32 Port = 3;
  string Node = 4;
}

message SvcLB {
  string IP = 1;
  string PortName = 2;
  int32 Port = 3;
  int32 NodePort = 4;
  string Protocol = 5;
  string SessionAffinity = 6;
  int32 SessionAffinityTimeout = 7;
  string TrafficPolicy = 8;
}

message SvcCache {
  string SvcID = 1;
  repeated SvcLB SvcLBs = 2;
  repeated Backend Backends = 3;
  repeated string SvcPortNames = 4;
}

message SvcFlowEntry {
  string IP = 1;
  string PortName = 2;
  uint64 FlowID = 3;
  string Info = 4;
}

message SvcDnatFlowEntry {
  Backend Backend = 1;
  uint64 FlowID = 2;
  string Info = 3;
}

message SvcFlow {
  repeated SvcFlowEntry LBFlows = 1;
  repeated SvcFlowEntry SessionAffinityFlows = 2;
  repeated SvcDnatFlowEntry DnatFlows = 3;
}

message SvcGroup {
  string PortName = 1;
  string TrafficPolicy = 2;
  uint32 GroupID = 3;
  string Info = 4;
}

message SvcInfo {
  SvcCache SvcCache = 1;
  SvcFlow SvcFlow = 2;
  repeated SvcGroup SvcGroup = 3;
}

message StreamRulesRequest {
  uint32 MaxCount = 1;
  uint32 BatchSize = 2;
}

service CLI {
  rpc GetAllRules(StreamRulesRequest) returns (stream RuleEntries){}
  rpc GetRulesByName(RuleIDs) returns (RuleEntries){}
  rpc GetRulesByFlow(FlowIDs) returns (RuleEntries){}
  rpc GetSvcInfoBySvcID(SvcID) returns (SvcInfo) {}
  rpc GetTRRulesByFlowIDs(FlowIDs) returns (TRRules) {}
  rpc GetTRRulesByRuleKeys(TRRuleKeys) returns (TRRules) {}

	rpc SetGOMemLimit(SetGOMemLimitRequest) returns (SetGOMemLimitResponse) {}
	rpc GetGOMemLimit(google.protobuf.Empty) returns (GetGOMemLimitResponse) {}
	rpc SetPolicyMemoryThreshold(SetPolicyMemoryThresholdRequest) returns (SetPolicyMemoryThresholdResponse) {}
	rpc SetPolicyRuleEstimateLimit(SetPolicyRuleEstimateLimitRequest) returns (SetPolicyRuleEstimateLimitResponse) {}
	rpc GetPolicyRuleEstimateLimit(google.protobuf.Empty) returns (GetPolicyRuleEstimateLimitResponse) {}
	rpc SetPolicyGuardEnabled(SetPolicyGuardEnabledRequest) returns (SetPolicyGuardEnabledResponse) {}
	rpc GetPolicyGuardStatus(google.protobuf.Empty) returns (PolicyGuardStatus) {}
	rpc EnablePprof(google.protobuf.Empty) returns (PprofStatus) {}
	rpc DisablePprof(google.protobuf.Empty) returns (PprofStatus) {}
	rpc GetPprofStatus(google.protobuf.Empty) returns (PprofStatus) {}
}

message TRRule{
  string SrcMac = 1;
  string DstMac = 2;
  string Direct = 3;
  map<string, uint64> FlowIDs = 4;
  repeated string Refs = 5;
}

message TRRules{
  repeated TRRule TRRules = 1;
}

message TRRuleKeys {
  repeated string TRRuleKeys = 1;
}

// SetGOMemLimitRequest is used to request setting the Go runtime memory limit.
message SetGOMemLimitRequest {
	int64 Limit = 1;
}

// SetGOMemLimitResponse returns the previous and the new/current memory limits.
message SetGOMemLimitResponse {
	int64 PrevLimit = 1;
	int64 CurrentLimit = 2;
}

// GetGOMemLimitResponse returns the current Go runtime memory limit.
message GetGOMemLimitResponse {
	int64 Limit = 1;
}

// SetPolicyMemoryThresholdRequest requests setting the policy memory guard threshold.
message SetPolicyMemoryThresholdRequest {
	uint64 Threshold = 1;
}

// SetPolicyMemoryThresholdResponse returns previous and current policy memory guard thresholds.
message SetPolicyMemoryThresholdResponse {
	uint64 PrevThreshold = 1;
	uint64 CurrentThreshold = 2;
}

// SetPolicyRuleEstimateLimitRequest requests setting the policy rule estimate limit.
message SetPolicyRuleEstimateLimitRequest {
	uint64 Limit = 1;
}

// SetPolicyRuleEstimateLimitResponse returns previous and current policy rule estimate limits.
message SetPolicyRuleEstimateLimitResponse {
	uint64 PrevLimit = 1;
	uint64 CurrentLimit = 2;
}

// GetPolicyRuleEstimateLimitResponse returns current policy rule estimate limit.
message GetPolicyRuleEstimateLimitResponse {
	uint64 Limit = 1;
}

// SetPolicyGuardEnabledRequest requests enabling or disabling a policy guard.
message SetPolicyGuardEnabledRequest {
	string Guard = 1;
	bool Enabled = 2;
}

// SetPolicyGuardEnabledResponse returns previous and current policy guard enabled states.
message SetPolicyGuardEnabledResponse {
	string Guard = 1;
	bool PrevEnabled = 2;
	bool CurrentEnabled = 3;
}

// PolicyGuardStatus returns current policy admission guard status.
message PolicyGuardStatus {
	bool MemoryEnabled = 1;
	bool MemoryBreakerOpen = 2;
	uint64 MemoryThreshold = 3;
	bool RuleEnabled = 4;
	uint64 RuleEstimateLimit = 5;
}

// PprofStatus returns the agent pprof switch state.
message PprofStatus {
	bool Enabled = 1;
	string URL = 2;
}
